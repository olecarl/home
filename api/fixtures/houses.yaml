App\Entity\PostalAddress:
    postal_address_{1..10}:
        addressCountry: <countryCode()>
        postalCode: <postCode()>
        addressLocality: <city()>
        streetAddress: <streetAddress()>

App\Entity\House:
    house_{1..10}:
        name: <word()>
        address: '@postal_address_<current()>'

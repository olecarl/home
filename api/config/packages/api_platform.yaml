api_platform:
    title: Home API
    description: My Smart Home Application
    version: 0.4.1
    
    # Mercure integration, remove if unwanted
    mercure: ~
    # Good cache defaults for REST APIs
    defaults:
        stateless: true
        cache_headers:
            vary: [ 'Content-Type', 'Authorization', 'Origin' ]
        formats:
            jsonld: [ 'application/ld+json' ]
            json: [ 'application/json' ]
            csv: [ 'text/csv' ]
            html: [ 'text/html' ]
